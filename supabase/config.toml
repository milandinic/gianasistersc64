# Supabase project config (CLI). Only the bits this project needs are set here;
# everything else uses CLI defaults.
#
# submit-score is called anonymously by the game client and is protected by an
# HMAC-SHA256 signature over `name|score|level|ts` (verified inside the function
# with the SCORE_SECRET), NOT by a Supabase JWT. Deployed functions default to
# verify_jwt = true, which makes the platform gateway reject anonymous calls with
# 401 UNAUTHORIZED_NO_AUTH_HEADER before the function ever runs. Turn it off so
# the HMAC is the only gate, as designed.
[functions.submit-score]
verify_jwt = false
